name: GitHub Projects to Slack Summary
description:
  Publishes summaries of GitHub Projects to Slack, showing tasks/issues grouped
  by engineers
author: sebastiendan

# Add your action's branding here. This will appear on the GitHub Marketplace.
branding:
  icon: message-square
  color: purple

# Define your inputs here.
inputs:
  github-token:
    description: 'GitHub token with access to read projects'
    required: true
  project-url:
    description:
      'GitHub Project URL (e.g., https://github.com/orgs/myorg/projects/1)'
    required: true
  slack-bot-token:
    description: 'Slack Bot Token (starts with xoxb-)'
    required: true
  slack-channel:
    description: 'Slack channel to post to (e.g., #general or C1234567890)'
    required: true
  assignee-field:
    description:
      'Name of the assignee field in the project (defaults to "Assignees")'
    required: false
    default: 'Assignees'
  max-items-per-user:
    description: 'Maximum number of items to show per user (defaults to 10)'
    required: false
    default: '10'
  done-items-days:
    description: 'Show Done items only if completed within this many days (defaults to 1)'
    required: false
    default: '1'

# Define your outputs here.
outputs:
  summary-sent:
    description: 'Whether the summary was successfully sent to Slack'
  total-items:
    description: 'Total number of items processed'
  users-count:
    description: 'Number of users with assigned items'

runs:
  using: node20
  main: dist/index.js
